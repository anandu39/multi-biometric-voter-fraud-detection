<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Booth Officer Login — EVRS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{
  --cream:#f5f0e8;--cream-dark:#ede5d8;--beige:#e8dcc8;--parchment:#faf6ee;
  --ink:#1a1a2e;--ink-soft:#2d3448;--ink-muted:#6b7280;
  --gold:#b8860b;--gold-bright:#d4a017;
  --navy:#1a3a6b;--navy-mid:#2a5298;--navy-light:#dde8f8;
  --red:#c0392b;--green:#1a6b3a;--white:#fff;--border:rgba(26,26,46,.1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--cream);min-height:100vh;display:flex;flex-direction:column;}
header{background:var(--parchment);border-bottom:2px solid var(--red);height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 clamp(1rem,4vw,2.5rem);box-shadow:0 1px 4px rgba(0,0,0,.06);}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
.logo-em{width:34px;height:34px;background:linear-gradient(135deg,var(--gold),#7a5c00);border-radius:7px;display:flex;align-items:center;justify-content:center;color:white;font-size:15px;}
.logo-abbr{font-family:'DM Mono',monospace;font-size:13px;color:var(--gold);letter-spacing:.15em;}
.back-link{display:inline-flex;align-items:center;gap:6px;color:var(--ink-muted);font-size:.82rem;text-decoration:none;}
.back-link:hover{color:var(--navy);}

.page{flex:1;display:flex;align-items:center;justify-content:center;padding:2.5rem 1rem;}
.wrap{width:100%;max-width:520px;}

.header{margin-bottom:28px;}
.phase-badge{display:inline-flex;align-items:center;gap:7px;background:#fef2f2;border:1.5px solid rgba(192,57,43,.2);color:var(--red);padding:5px 14px;border-radius:100px;font-size:.72rem;font-family:'DM Mono',monospace;letter-spacing:.06em;margin-bottom:14px;}
.header h1{font-family:'Playfair Display',serif;font-size:2rem;font-weight:700;color:var(--ink);margin-bottom:8px;}
.header p{font-size:.875rem;color:var(--ink-muted);font-weight:300;line-height:1.6;}

.card{background:var(--parchment);border:1.5px solid var(--beige);border-radius:16px;padding:28px;box-shadow:0 4px 20px rgba(0,0,0,.08);}
.section-sep{font-size:.68rem;font-weight:700;color:var(--gold);letter-spacing:.12em;text-transform:uppercase;margin:20px 0 14px;padding-bottom:8px;border-bottom:1px solid var(--beige);}
.form-grid{display:grid;gap:14px;}
.cols-2{grid-template-columns:1fr 1fr;}
.form-group{display:flex;flex-direction:column;gap:6px;}
label{font-size:.73rem;font-weight:700;color:var(--ink-soft);letter-spacing:.07em;text-transform:uppercase;}
.input-wrap{position:relative;}
.input-wrap i{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--ink-muted);font-size:13px;}
input,select{width:100%;background:white;border:1.5px solid var(--beige);color:var(--ink);padding:11px 13px 11px 38px;border-radius:9px;font-family:'DM Sans',sans-serif;font-size:.875rem;outline:none;transition:border-color .2s;}
select{padding-left:13px;}
input:focus,select:focus{border-color:var(--navy);}
input::placeholder{color:var(--ink-muted);}
select option{background:white;color:var(--ink);}

/* MULTI-WARD SECTION */
.ward-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;min-height:28px;}
.ward-tag{display:inline-flex;align-items:center;gap:6px;background:var(--navy-light);color:var(--navy);padding:4px 10px;border-radius:100px;font-size:.75rem;font-weight:600;}
.ward-tag button{background:none;border:none;color:var(--navy);cursor:pointer;font-size:11px;padding:0;line-height:1;}
.ward-tag button:hover{color:var(--red);}
.ward-add-row{display:flex;gap:8px;margin-top:8px;}
.ward-add-row input{flex:1;padding-left:13px;}
.btn-add-ward{background:var(--navy);color:white;border:none;padding:10px 16px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.8rem;font-weight:600;cursor:pointer;white-space:nowrap;}

.btn-submit{width:100%;background:linear-gradient(135deg,var(--gold),#7a5c00);color:white;border:none;padding:14px;border-radius:9px;font-family:'DM Sans',sans-serif;font-size:.9rem;font-weight:700;cursor:pointer;letter-spacing:.04em;transition:opacity .2s,transform .2s;margin-top:10px;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-submit:hover{opacity:.9;transform:translateY(-1px);}
.btn-submit:disabled{opacity:.45;cursor:not-allowed;transform:none;}
.alert{padding:12px 16px;border-radius:8px;font-size:.85rem;margin-bottom:16px;display:none;align-items:center;gap:9px;}
.alert.error{background:#fef2f2;border:1.5px solid rgba(192,57,43,.2);color:var(--red);}
.alert.success{background:#f0fdf4;border:1.5px solid rgba(26,107,58,.2);color:var(--green);}
.alert.show{display:flex;}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.4);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
footer{text-align:center;padding:16px;color:var(--ink-muted);font-size:.75rem;border-top:1px solid var(--beige);}
@media(max-width:480px){.cols-2{grid-template-columns:1fr;}}
</style>
</head>
<body>
<header>
  <a href="index.html" class="logo">
    <div class="logo-em"><i class="fa-solid fa-landmark-dome"></i></div>
    <span class="logo-abbr">EVRS</span>
  </a>
  <a href="index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Back to Home</a>
</header>

<div class="page">
  <div class="wrap">
    <div class="header">
      <div class="phase-badge"><i class="fa-solid fa-shield-halved"></i> ELECTION DAY — BOOTH ACCESS</div>
      <h1>Booth Officer<br>Sign In</h1>
      <p>Sign in with your officer credentials and assign your polling booth to begin voter verification.</p>
    </div>

    <div id="alertBox" class="alert"></div>

    <div class="card">
      <div class="form-grid">
        <div class="form-group">
          <label>Mobile Number or Employee ID</label>
          <div class="input-wrap">
            <i class="fa-solid fa-id-badge"></i>
            <input type="text" id="identifier" placeholder="Enter your mobile number or EMP ID">
          </div>
        </div>
        <div class="form-group">
          <label>Password</label>
          <div class="input-wrap">
            <i class="fa-solid fa-lock"></i>
            <input type="password" id="password" placeholder="Enter your password">
          </div>
        </div>
      </div>

      <div class="section-sep">Booth Location</div>

      <div class="form-grid">
        <div class="form-grid cols-2">
          <div class="form-group">
            <label>State</label>
            <select id="state">
              <option value="">Select state</option>
              <option>Andhra Pradesh</option><option>Arunachal Pradesh</option><option>Assam</option>
              <option>Bihar</option><option>Chhattisgarh</option><option>Goa</option>
              <option>Gujarat</option><option>Haryana</option><option>Himachal Pradesh</option>
              <option>Jharkhand</option><option>Karnataka</option><option>Kerala</option>
              <option>Madhya Pradesh</option><option>Maharashtra</option><option>Manipur</option>
              <option>Meghalaya</option><option>Mizoram</option><option>Nagaland</option>
              <option>Odisha</option><option>Punjab</option><option>Rajasthan</option>
              <option>Sikkim</option><option>Tamil Nadu</option><option>Telangana</option>
              <option>Tripura</option><option>Uttar Pradesh</option><option>Uttarakhand</option>
              <option>West Bengal</option><option>Delhi</option>
            </select>
          </div>
          <div class="form-group">
            <label>District</label>
            <div class="input-wrap">
              <i class="fa-solid fa-map"></i>
              <input type="text" id="district" placeholder="District name">
            </div>
          </div>
        </div>

        <!-- MULTI-WARD -->
        <div class="form-group">
          <label>Ward Numbers <span style="color:var(--ink-muted);font-size:.65rem;text-transform:none;letter-spacing:0">(a booth can serve multiple wards)</span></label>
          <div class="ward-tags" id="wardTags"></div>
          <div class="ward-add-row">
            <input type="text" id="wardInput" placeholder="Enter ward number and press Add" style="padding-left:13px" onkeydown="if(event.key==='Enter'){event.preventDefault();addWard();}">
            <button type="button" class="btn-add-ward" onclick="addWard()"><i class="fa-solid fa-plus"></i> Add</button>
          </div>
        </div>

        <div class="form-group">
          <label>Booth Name / Number</label>
          <div class="input-wrap">
            <i class="fa-solid fa-building-columns"></i>
            <input type="text" id="booth_name" placeholder="e.g. Booth 4A">
          </div>
        </div>
      </div>

      <button class="btn-submit" id="loginBtn" onclick="handleLogin()">
        <i class="fa-solid fa-shield-halved"></i> Begin Booth Session
      </button>
    </div>
  </div>
</div>

<footer>EVRS Election Day Module · Authorised Access Only</footer>

<script>
// Already logged in as booth officer
const bs = JSON.parse(sessionStorage.getItem('evrs_booth')||'null');
if (bs && bs.expires > Date.now()) window.location.href = 'booth-verify.html';

let wards = [];

function addWard() {
  const input = document.getElementById('wardInput');
  const val = input.value.trim();
  if (!val) return;
  if (wards.includes(val)) { input.value=''; return; }
  wards.push(val);
  renderWards();
  input.value = '';
  input.focus();
}

function removeWard(w) {
  wards = wards.filter(x=>x!==w);
  renderWards();
}

function renderWards() {
  document.getElementById('wardTags').innerHTML = wards.map(w=>`
    <span class="ward-tag">
      <i class="fa-solid fa-location-dot" style="font-size:10px"></i> Ward ${w}
      <button type="button" onclick="removeWard('${w}')"><i class="fa-solid fa-xmark"></i></button>
    </span>`).join('');
}

function showAlert(msg, type) {
  const b = document.getElementById('alertBox');
  b.innerHTML = `<i class="fa-solid fa-${type==='error'?'circle-exclamation':'circle-check'}"></i> ${msg}`;
  b.className = `alert ${type} show`;
}

async function handleLogin() {
  const identifier  = document.getElementById('identifier').value.trim();
  const password    = document.getElementById('password').value;
  const state       = document.getElementById('state').value;
  const district    = document.getElementById('district').value.trim();
  const booth_name  = document.getElementById('booth_name').value.trim();

  if (!identifier||!password) { showAlert('Enter your credentials.','error'); return; }
  if (!state||!district) { showAlert('Select state and enter district.','error'); return; }
  if (!wards.length) { showAlert('Add at least one ward number.','error'); return; }

  const btn = document.getElementById('loginBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Verifying…';

  try {
    const res = await fetch('http://127.0.0.1:5000/api/booth/login', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        identifier, password, state, district,
        ward_number: wards[0],   // primary ward for DB
        ward_numbers: wards,      // all wards for frontend context
        booth_name
      })
    });
    const data = await res.json();
    if (!res.ok) { showAlert(data.error||'Login failed.','error'); return; }

    // ROLE CHECK — only booth_officer or supervisor allowed here
    if (data.role === 'registration_officer') {
      showAlert('Your account is a Registration Officer account. Please use the main Officer Login to register voters.','error');
      return;
    }

    sessionStorage.setItem('evrs_booth', JSON.stringify({
      officer_id:   data.officer_id,
      officer_name: data.officer_name,
      role:         data.role,
      booth: {
        state, district,
        ward_number:  wards[0],
        ward_numbers: wards,
        booth_name:   booth_name || `Booth — Ward ${wards.join(', ')}`
      },
      expires: Date.now() + 8 * 60 * 60 * 1000
    }));

    showAlert('Login successful! Loading booth…','success');
    setTimeout(()=>window.location.href='booth-verify.html', 800);

  } catch {
    showAlert('Cannot connect to server.','error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<i class="fa-solid fa-shield-halved"></i> Begin Booth Session';
  }
}

document.addEventListener('keydown', e => { if(e.key==='Enter' && e.target.id!=='wardInput') handleLogin(); });
</script>
</body>
</html>
