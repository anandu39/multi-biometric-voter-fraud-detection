<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Officer Login — EVRS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{
  --cream:#f5f0e8;--cream-dark:#ede5d8;--beige:#e8dcc8;--parchment:#faf6ee;
  --ink:#1a1a2e;--ink-soft:#2d3448;--ink-muted:#6b7280;
  --gold:#b8860b;--gold-bright:#d4a017;--gold-light:#f0d98a;
  --navy:#1a3a6b;--navy-mid:#2a5298;--navy-light:#dde8f8;
  --red:#c0392b;--green:#1a6b3a;--white:#fff;--border:rgba(26,26,46,.1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--cream);min-height:100vh;display:flex;flex-direction:column;}

/* HEADER */
header{background:var(--parchment);border-bottom:2px solid var(--gold);height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 clamp(1rem,4vw,2.5rem);box-shadow:0 1px 4px rgba(0,0,0,.06);}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
.logo-em{width:34px;height:34px;background:linear-gradient(135deg,var(--gold),#7a5c00);border-radius:7px;display:flex;align-items:center;justify-content:center;color:white;font-size:15px;}
.logo-abbr{font-family:'DM Mono',monospace;font-size:13px;color:var(--gold);letter-spacing:.15em;}
.back-link{display:inline-flex;align-items:center;gap:6px;color:var(--ink-muted);font-size:.82rem;text-decoration:none;transition:color .2s;}
.back-link:hover{color:var(--navy);}

/* MAIN */
.page{flex:1;display:flex;align-items:center;justify-content:center;padding:2.5rem 1rem;}
.login-wrap{width:100%;max-width:440px;}

.login-header{margin-bottom:32px;}
.role-badge{display:inline-flex;align-items:center;gap:7px;background:var(--navy-light);border:1px solid rgba(42,82,152,.2);color:var(--navy);padding:5px 14px;border-radius:100px;font-size:.72rem;font-family:'DM Mono',monospace;letter-spacing:.06em;margin-bottom:16px;}
.login-header h1{font-family:'Playfair Display',serif;font-size:2rem;font-weight:700;color:var(--ink);line-height:1.2;margin-bottom:8px;}
.login-header p{font-size:.875rem;color:var(--ink-muted);font-weight:300;line-height:1.6;}

/* CARD */
.login-card{background:var(--parchment);border:1.5px solid var(--beige);border-radius:16px;padding:32px 28px;box-shadow:0 4px 20px rgba(0,0,0,.08);}
.form-group{margin-bottom:18px;}
label{display:block;font-size:.73rem;font-weight:700;color:var(--ink-soft);letter-spacing:.07em;text-transform:uppercase;margin-bottom:7px;}
.input-wrap{position:relative;}
.input-wrap i{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--ink-muted);font-size:14px;}
input[type="text"],input[type="password"],input[type="tel"]{
  width:100%;background:white;border:1.5px solid var(--beige);color:var(--ink);
  padding:11px 13px 11px 40px;border-radius:9px;font-family:'DM Sans',sans-serif;font-size:.9rem;
  outline:none;transition:border-color .2s;}
input:focus{border-color:var(--navy);}
input::placeholder{color:var(--ink-muted);}
.btn-submit{
  width:100%;background:linear-gradient(135deg,var(--gold),#7a5c00);color:white;
  border:none;padding:14px;border-radius:9px;font-family:'DM Sans',sans-serif;
  font-size:.9rem;font-weight:700;cursor:pointer;letter-spacing:.04em;
  transition:opacity .2s,transform .2s;margin-top:6px;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-submit:hover{opacity:.9;transform:translateY(-1px);}
.btn-submit:disabled{opacity:.5;cursor:not-allowed;transform:none;}
.divider{display:flex;align-items:center;gap:12px;margin:20px 0;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--beige);}
.divider span{font-size:.73rem;color:var(--ink-muted);}
.register-prompt{text-align:center;font-size:.82rem;color:var(--ink-muted);}
.register-prompt a{color:var(--navy);text-decoration:none;font-weight:600;}
.register-prompt a:hover{text-decoration:underline;}
.alert{padding:12px 16px;border-radius:8px;font-size:.85rem;margin-bottom:16px;display:none;align-items:center;gap:9px;}
.alert.error{background:#fef2f2;border:1.5px solid rgba(192,57,43,.2);color:var(--red);}
.alert.success{background:#f0fdf4;border:1.5px solid rgba(26,107,58,.2);color:var(--green);}
.alert.show{display:flex;}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.4);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
footer{text-align:center;padding:16px;color:var(--ink-muted);font-size:.75rem;border-top:1px solid var(--beige);}
</style>
</head>
<body>

<header>
  <a href="index.html" class="logo">
    <div class="logo-em"><i class="fa-solid fa-landmark-dome"></i></div>
    <span class="logo-abbr">EVRS</span>
  </a>
  <a href="index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Back to Home</a>
</header>

<div class="page">
  <div class="login-wrap">
    <div class="login-header">
      <div class="role-badge"><i class="fa-solid fa-user-shield"></i> OFFICER PORTAL</div>
      <h1>Welcome Back</h1>
      <p>Sign in with your mobile number or employee ID to access the portal. Session stays active for 8 hours.</p>
    </div>

    <div id="alertBox" class="alert"></div>

    <div class="login-card">
      <div class="form-group">
        <label>Mobile Number or Employee ID</label>
        <div class="input-wrap">
          <i class="fa-solid fa-id-badge"></i>
          <input type="text" id="identifier" placeholder="Enter your mobile number or EMP ID" autocomplete="username">
        </div>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="input-wrap">
          <i class="fa-solid fa-lock"></i>
          <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password">
        </div>
      </div>

      <button class="btn-submit" id="loginBtn" onclick="handleLogin()">
        <i class="fa-solid fa-right-to-bracket"></i> Sign In to Portal
      </button>

      <div class="divider"><span>New to EVRS?</span></div>

      <div class="register-prompt">
        Not registered? <a href="officer-register.html">Create your officer account →</a>
      </div>
    </div>
  </div>
</div>

<footer>EVRS &nbsp;·&nbsp; Authorised Personnel Only &nbsp;·&nbsp; Government of India</footer>

<script>
// Already logged in → redirect based on role
const session = JSON.parse(sessionStorage.getItem('evrs_officer') || 'null');
if (session && session.expires > Date.now()) {
  window.location.href = session.role === 'booth_officer' ? 'booth-login.html' : session.role === 'supervisor' ? 'admin-approval.html' : 'register.html';
}

function showAlert(msg, type) {
  const box = document.getElementById('alertBox');
  box.innerHTML = `<i class="fa-solid fa-${type==='error'?'circle-exclamation':'circle-check'}"></i> ${msg}`;
  box.className = `alert ${type} show`;
}

async function handleLogin() {
  const identifier = document.getElementById('identifier').value.trim();
  const password   = document.getElementById('password').value;
  const btn        = document.getElementById('loginBtn');

  if (!identifier || !password) { showAlert('Please fill in all fields.', 'error'); return; }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Verifying…';

  try {
    const res  = await fetch('http://127.0.0.1:5000/api/officer/login', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ identifier, password })
    });
    const data = await res.json();

    if (!res.ok) { showAlert(data.error || 'Login failed. Check your credentials.', 'error'); return; }

    // Store session with role
    sessionStorage.setItem('evrs_officer', JSON.stringify({
      id:         data.officer_id,
      officer_id: data.officer_id,
      name:       data.name,
      role:       data.role,
      district:   data.district,
      expires:    Date.now() + 8 * 60 * 60 * 1000
    }));

    showAlert('Login successful! Redirecting…', 'success');

    // Role-based redirect
    setTimeout(() => {
      if (data.role === 'booth_officer') {
        window.location.href = 'booth-login.html';
      } else if (data.role === 'supervisor') {
        window.location.href = 'admin-approval.html';
      } else {
        window.location.href = 'register.html';
      }
    }, 900);

  } catch {
    showAlert('Cannot connect to server. Is Flask running?', 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Sign In to Portal';
  }
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
</script>
</body>
</html>
