<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Officer Login — EVRS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #0a0e1a;
  --ink-soft: #2d3448;
  --ink-muted: #6b7280;
  --cream: #faf8f4;
  --gold: #c9973a;
  --gold-light: #f0d98a;
  --blue: #1a3a6b;
  --blue-mid: #2a5298;
  --blue-light: #e8eef8;
  --red: #dc2626;
  --green: #16a34a;
  --white: #ffffff;
  --border: rgba(10,14,26,0.12);
  --shadow-md: 0 4px 20px rgba(0,0,0,0.10);
  --shadow-lg: 0 20px 60px rgba(0,0,0,0.18);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--ink);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
}
.bg-grid {
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(201,151,58,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(201,151,58,0.04) 1px, transparent 1px);
  background-size: 44px 44px;
  pointer-events: none;
}
.bg-glow {
  position: fixed;
  top: -200px; right: -200px;
  width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(201,151,58,0.07) 0%, transparent 70%);
  pointer-events: none;
}
.bg-glow2 {
  position: fixed;
  bottom: -200px; left: -100px;
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(26,58,107,0.3) 0%, transparent 70%);
  pointer-events: none;
}
.page {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2rem 1rem;
  position: relative;
  z-index: 1;
}
.login-wrap {
  width: 100%;
  max-width: 440px;
}
.back-link {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  color: rgba(255,255,255,0.4);
  font-size: 0.82rem;
  text-decoration: none;
  margin-bottom: 32px;
  transition: color 0.2s;
  letter-spacing: 0.04em;
}
.back-link:hover { color: var(--gold); }
.login-header {
  margin-bottom: 36px;
}
.logo-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 20px;
}
.logo-emblem {
  width: 44px; height: 44px;
  background: linear-gradient(135deg, var(--gold), #8a6520);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
}
.logo-abbr {
  font-family: 'DM Mono', monospace;
  font-size: 14px;
  font-weight: 500;
  color: var(--gold);
  letter-spacing: 0.15em;
}
.login-header h1 {
  font-family: 'Playfair Display', serif;
  font-size: 1.9rem;
  font-weight: 700;
  color: var(--white);
  line-height: 1.2;
  margin-bottom: 8px;
}
.login-header p {
  font-size: 0.875rem;
  color: rgba(255,255,255,0.4);
  font-weight: 300;
  line-height: 1.6;
}
.login-card {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 16px;
  padding: 32px 28px;
  backdrop-filter: blur(12px);
}
.form-group {
  margin-bottom: 20px;
}
label {
  display: block;
  font-size: 0.78rem;
  font-weight: 600;
  color: rgba(255,255,255,0.5);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.input-wrap {
  position: relative;
}
.input-wrap .input-icon {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 16px;
  pointer-events: none;
  opacity: 0.5;
}
input[type="text"], input[type="password"], input[type="tel"] {
  width: 100%;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  color: var(--white);
  padding: 12px 14px 12px 42px;
  border-radius: 8px;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.9rem;
  transition: border-color 0.2s, background 0.2s;
  outline: none;
}
input[type="text"]:focus, input[type="password"]:focus, input[type="tel"]:focus {
  border-color: var(--gold);
  background: rgba(201,151,58,0.06);
}
input::placeholder { color: rgba(255,255,255,0.2); }
.input-hint {
  font-size: 0.75rem;
  color: rgba(255,255,255,0.25);
  margin-top: 5px;
}
.btn-submit {
  width: 100%;
  background: linear-gradient(135deg, var(--gold), #a87828);
  color: var(--ink);
  border: none;
  padding: 14px;
  border-radius: 8px;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.9rem;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 0.05em;
  transition: opacity 0.2s, transform 0.2s;
  margin-top: 8px;
}
.btn-submit:hover { opacity: 0.9; transform: translateY(-1px); }
.btn-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.divider {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 22px 0;
}
.divider::before, .divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: rgba(255,255,255,0.08);
}
.divider span {
  font-size: 0.75rem;
  color: rgba(255,255,255,0.25);
  letter-spacing: 0.06em;
}
.register-prompt {
  text-align: center;
  font-size: 0.82rem;
  color: rgba(255,255,255,0.35);
}
.register-prompt a {
  color: var(--gold);
  text-decoration: none;
  font-weight: 500;
}
.register-prompt a:hover { text-decoration: underline; }
.alert {
  padding: 12px 16px;
  border-radius: 8px;
  font-size: 0.85rem;
  margin-bottom: 20px;
  display: none;
}
.alert.error { background: rgba(220,38,38,0.12); border: 1px solid rgba(220,38,38,0.3); color: #fca5a5; }
.alert.success { background: rgba(22,163,74,0.12); border: 1px solid rgba(22,163,74,0.3); color: #86efac; }
.alert.show { display: block; }
.spinner {
  display: inline-block;
  width: 14px; height: 14px;
  border: 2px solid rgba(10,14,26,0.3);
  border-top-color: var(--ink);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  margin-right: 8px;
  vertical-align: middle;
}
@keyframes spin { to { transform: rotate(360deg); } }
footer {
  text-align: center;
  padding: 16px;
  color: rgba(255,255,255,0.2);
  font-size: 0.75rem;
  position: relative;
  z-index: 1;
  letter-spacing: 0.04em;
}
@media (max-width: 480px) {
  .login-card { padding: 24px 18px; }
  .login-header h1 { font-size: 1.6rem; }
}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow"></div>
<div class="bg-glow2"></div>

<div class="page">
  <div class="login-wrap">
    <a href="index.html" class="back-link">← Back to Home</a>

    <div class="login-header">
      <div class="logo-row">
        <div class="logo-emblem">🗳</div>
        <span class="logo-abbr">EVRS</span>
      </div>
      <h1>Officer<br>Sign In</h1>
      <p>Enter your credentials to access the election officer portal. Session valid for 8 hours.</p>
    </div>

    <div id="alertBox" class="alert"></div>

    <div class="login-card">
      <div class="form-group">
        <label>Mobile Number or Employee ID</label>
        <div class="input-wrap">
          <span class="input-icon">👤</span>
          <input type="text" id="identifier" placeholder="98765 43210 or EMP-XXXXX" autocomplete="username">
        </div>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="input-wrap">
          <span class="input-icon">🔒</span>
          <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password">
        </div>
      </div>

      <button class="btn-submit" id="loginBtn" onclick="handleLogin()">Sign In to Portal</button>

      <div class="divider"><span>New to EVRS?</span></div>

      <div class="register-prompt">
        Not registered yet? <a href="officer-register.html">Create your officer account →</a>
      </div>
    </div>
  </div>
</div>

<footer>EVRS &nbsp;·&nbsp; Authorised Personnel Only &nbsp;·&nbsp; Government of India</footer>

<script>
// Check if already logged in
const session = JSON.parse(sessionStorage.getItem('evrs_officer') || 'null');
if (session && session.expires > Date.now()) {
  window.location.href = 'register.html';
}

function showAlert(msg, type) {
  const box = document.getElementById('alertBox');
  box.textContent = msg;
  box.className = `alert ${type} show`;
}

async function handleLogin() {
  const identifier = document.getElementById('identifier').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('loginBtn');

  if (!identifier || !password) { showAlert('Please fill in all fields.', 'error'); return; }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Verifying...';

  try {
    const res = await fetch('http://127.0.0.1:5000/api/officer/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ identifier, password })
    });
    const data = await res.json();

    if (!res.ok) { showAlert(data.error || 'Login failed. Check your credentials.', 'error'); return; }

    // Store session (8 hours)
    sessionStorage.setItem('evrs_officer', JSON.stringify({
      id: data.officer_id,
      name: data.name,
      role: data.role,
      expires: Date.now() + 8 * 60 * 60 * 1000
    }));

    showAlert('Login successful! Redirecting…', 'success');
    setTimeout(() => window.location.href = 'register.html', 900);

  } catch (e) {
    showAlert('Cannot connect to server. Is Flask running?', 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'Sign In to Portal';
  }
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
</script>
</body>
</html>
