<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voter Registry — EVRS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root {
  --cream:#f5f0e8;--cream-dark:#ede5d8;--beige:#e8dcc8;--parchment:#faf6ee;
  --ink:#1a1a2e;--ink-soft:#2d3448;--ink-muted:#6b7280;
  --gold:#b8860b;--gold-bright:#d4a017;--gold-light:#f0d98a;
  --navy:#1a3a6b;--navy-mid:#2a5298;--navy-light:#dde8f8;
  --red:#c0392b;--green:#1a6b3a;--green-light:#d4f1df;
  --white:#fff;--border:rgba(26,26,46,0.1);
  --shadow-sm:0 1px 4px rgba(0,0,0,0.06);--shadow-md:0 6px 24px rgba(0,0,0,0.1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh;}

/* HEADER */
header{background:var(--parchment);border-bottom:2px solid var(--gold);height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 clamp(1rem,4vw,2.5rem);position:sticky;top:0;z-index:100;box-shadow:var(--shadow-sm);}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
.logo-em{width:34px;height:34px;background:linear-gradient(135deg,var(--gold),#7a5c00);border-radius:7px;display:flex;align-items:center;justify-content:center;color:white;font-size:15px;}
.logo-abbr{font-family:'DM Mono',monospace;font-size:13px;color:var(--gold);letter-spacing:.15em;}
.header-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.officer-pill{background:var(--navy-light);border:1px solid rgba(42,82,152,.2);color:var(--navy);padding:5px 12px;border-radius:100px;font-size:.75rem;font-weight:600;}
.btn-nav{background:transparent;color:var(--ink-soft);border:1.5px solid var(--border);padding:6px 14px;border-radius:7px;font-family:'DM Sans',sans-serif;font-size:.78rem;font-weight:500;cursor:pointer;text-decoration:none;transition:all .2s;}
.btn-nav:hover{background:var(--beige);}
.btn-nav.primary{background:var(--navy);color:white;border-color:var(--navy);}
.btn-nav.primary:hover{background:var(--navy-mid);}
.btn-logout{color:var(--red);border-color:rgba(192,57,43,.25);}
.btn-logout:hover{background:rgba(192,57,43,.06);}

main{max-width:1100px;margin:0 auto;padding:clamp(1.5rem,4vw,2.5rem) clamp(1rem,4vw,2rem);}

/* TOP BAR */
.top-bar{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:20px;flex-wrap:wrap;}
.page-title h1{font-family:'Playfair Display',serif;font-size:1.7rem;font-weight:700;}
.page-title p{font-size:.82rem;color:var(--ink-muted);font-weight:300;}
.top-actions{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.search-wrap{position:relative;}
.search-wrap i{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--ink-muted);font-size:13px;}
.search-wrap input{background:var(--parchment);border:1.5px solid var(--beige);color:var(--ink);padding:9px 14px 9px 36px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.85rem;width:250px;outline:none;transition:border-color .2s;}
.search-wrap input:focus{border-color:var(--navy);}
.search-wrap input::placeholder{color:var(--ink-muted);}
.filter-select{background:var(--parchment);border:1.5px solid var(--beige);color:var(--ink);padding:9px 12px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.85rem;outline:none;cursor:pointer;}
.btn-refresh{background:var(--navy);color:white;border:none;padding:9px 16px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:600;cursor:pointer;}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:22px;}
.stat-card{background:var(--parchment);border:1.5px solid var(--beige);border-radius:10px;padding:14px;text-align:center;box-shadow:var(--shadow-sm);}
.stat-num{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:700;color:var(--navy);}
.stat-num.amber{color:var(--gold);}
.stat-num.red{color:var(--red);}
.stat-lbl{font-size:.68rem;color:var(--ink-muted);text-transform:uppercase;letter-spacing:.07em;margin-top:3px;font-weight:600;}

/* PENDING BANNER */
.pending-banner{background:#fff8e8;border:1.5px solid rgba(184,134,11,.3);border-radius:10px;padding:12px 18px;margin-bottom:18px;display:flex;align-items:center;justify-content:space-between;gap:12px;display:none;}
.pending-banner.show{display:flex;}
.pending-banner-text{font-size:.85rem;color:#7a5c00;font-weight:500;}
.pending-banner a{background:var(--gold);color:var(--ink);text-decoration:none;padding:6px 14px;border-radius:7px;font-size:.78rem;font-weight:700;}

/* VOTER CARDS */
.voters-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:14px;}
.voter-card{background:var(--parchment);border:1.5px solid var(--beige);border-radius:12px;overflow:hidden;box-shadow:var(--shadow-sm);cursor:pointer;transition:box-shadow .2s,transform .2s;}
.voter-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px);}
.voter-card.expanded{box-shadow:0 8px 32px rgba(26,58,107,.12);border-color:rgba(42,82,152,.3);transform:none;}

.voter-card-top{padding:15px;display:flex;align-items:flex-start;gap:13px;}
.voter-avatar{width:46px;height:46px;border-radius:11px;display:flex;align-items:center;justify-content:center;background:var(--navy-light);color:var(--navy);font-family:'Playfair Display',serif;font-weight:700;font-size:1.1rem;flex-shrink:0;}
.voter-name{font-weight:600;font-size:.95rem;color:var(--ink);margin-bottom:3px;}
.voter-id-badge{font-family:'DM Mono',monospace;font-size:.68rem;color:var(--ink-muted);background:var(--cream-dark);padding:2px 7px;border-radius:4px;display:inline-block;}
.voter-meta{font-size:.78rem;color:var(--ink-muted);display:flex;flex-wrap:wrap;gap:6px;margin-top:5px;}
.voter-meta span{display:flex;align-items:center;gap:4px;}

/* BIO STATUS PILL */
.bio-pill{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:100px;font-size:.68rem;font-weight:700;margin-top:5px;}
.bio-pill.done{background:var(--green-light);color:var(--green);}
.bio-pill.pending{background:#fef3c7;color:#92400e;border:1px solid rgba(234,179,8,.3);}
.bio-pill.unknown{background:var(--cream-dark);color:var(--ink-muted);}

.voter-card-footer{padding:9px 15px;background:var(--cream-dark);border-top:1px solid var(--beige);display:flex;justify-content:space-between;align-items:center;font-size:.75rem;color:var(--ink-muted);}
.expand-icon{transition:transform .25s;font-size:11px;}
.voter-card.expanded .expand-icon{transform:rotate(180deg);}

/* EXPANDED */
.voter-details{max-height:0;overflow:hidden;transition:max-height .35s ease,padding .25s;padding:0 16px;}
.voter-card.expanded .voter-details{max-height:700px;padding:16px;}
.detail-section{margin-bottom:14px;}
.detail-section-title{font-size:.65rem;font-weight:700;color:var(--navy-mid);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px;padding-bottom:5px;border-bottom:2px solid var(--navy-light);}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.detail-item .detail-label{color:var(--ink-muted);font-size:.68rem;text-transform:uppercase;letter-spacing:.05em;font-weight:600;}
.detail-item .detail-value{color:var(--ink-soft);font-weight:500;font-size:.82rem;margin-top:1px;}
.doc-badge{display:inline-flex;align-items:center;gap:5px;background:var(--navy-light);color:var(--navy);padding:4px 10px;border-radius:6px;font-size:.7rem;font-family:'DM Mono',monospace;margin:2px;}
.bio-action-btn{display:inline-flex;align-items:center;gap:7px;background:var(--gold);color:var(--ink);border:none;padding:8px 16px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.8rem;font-weight:700;cursor:pointer;text-decoration:none;margin-top:8px;}
.bio-action-btn:hover{background:var(--gold-bright);}

.empty-state{text-align:center;padding:60px 20px;color:var(--ink-muted);}
.empty-icon{font-size:3rem;opacity:.35;margin-bottom:10px;}

/* SKELETON */
.skel-card{background:var(--parchment);border:1.5px solid var(--beige);border-radius:12px;padding:16px;}
.skeleton{background:linear-gradient(90deg,var(--beige) 25%,var(--cream-dark) 50%,var(--beige) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:6px;height:12px;margin-bottom:8px;}
@keyframes shimmer{to{background-position:-200% 0;}}

@media(max-width:640px){
  .voters-grid{grid-template-columns:1fr;}
  .search-wrap input{width:100%;}
  .top-bar{flex-direction:column;align-items:flex-start;}
  .top-actions{width:100%;}
  .detail-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<header>
  <a href="index.html" class="logo">
    <div class="logo-em"><i class="fa-solid fa-landmark-dome"></i></div>
    <span class="logo-abbr">EVRS</span>
  </a>
  <div class="header-right">
    <span class="officer-pill" id="officerName">—</span>
    <a href="register.html" class="btn-nav primary"><i class="fa-solid fa-user-plus"></i> Register Voter</a>
    <a href="biometrics-pending.html" class="btn-nav"><i class="fa-solid fa-camera"></i> Pending Biometrics</a>
    <button class="btn-nav btn-logout" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> Sign Out</button>
  </div>
</header>

<main>
  <div class="top-bar">
    <div class="page-title">
      <h1>Voter Registry</h1>
      <p>All enrolled citizens — click any card to expand details</p>
    </div>
    <div class="top-actions">
      <div class="search-wrap">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" id="searchInput" placeholder="Name, phone, ward, district…" oninput="filterCards()">
      </div>
      <select class="filter-select" id="districtFilter" onchange="filterCards()">
        <option value="">All Districts</option>
      </select>
      <select class="filter-select" id="bioFilter" onchange="filterCards()">
        <option value="">All Biometric Status</option>
        <option value="done">Biometrics Done</option>
        <option value="pending">Biometrics Pending</option>
      </select>
      <button class="btn-refresh" onclick="loadVoters()"><i class="fa-solid fa-rotate-right"></i></button>
    </div>
  </div>

  <!-- Pending biometrics banner -->
  <div class="pending-banner" id="pendingBanner">
    <span class="pending-banner-text"><i class="fa-solid fa-triangle-exclamation"></i> <span id="pendingCount">0</span> voters have no biometrics recorded yet.</span>
    <a href="biometrics-pending.html"><i class="fa-solid fa-camera"></i> Capture Now</a>
  </div>

  <div class="stats-row" id="statsRow">
    <div class="stat-card"><div class="stat-num" id="s-total">—</div><div class="stat-lbl">Total Enrolled</div></div>
    <div class="stat-card"><div class="stat-num" id="s-today">—</div><div class="stat-lbl">Registered Today</div></div>
    <div class="stat-card"><div class="stat-num amber" id="s-pending-bio">—</div><div class="stat-lbl">Pending Biometrics</div></div>
    <div class="stat-card"><div class="stat-num" id="s-active">—</div><div class="stat-lbl">Active</div></div>
  </div>

  <div id="voterGrid" class="voters-grid"></div>
  <div class="empty-state" id="emptyState" style="display:none">
    <div class="empty-icon"><i class="fa-solid fa-users"></i></div>
    <p>No voters found matching your search.</p>
  </div>
</main>

<script>
const session = JSON.parse(sessionStorage.getItem('evrs_officer') || 'null');
if (!session || session.expires < Date.now()) {
  window.location.href = 'login.html';
} else {
  document.getElementById('officerName').textContent = session.name;
}

// Inactivity logout after 60 min
let inactivityTimer;
function resetTimer() {
  clearTimeout(inactivityTimer);
  inactivityTimer = setTimeout(() => { sessionStorage.removeItem('evrs_officer'); window.location.href = 'login.html'; }, 60 * 60 * 1000);
}
['mousemove','keydown','click','touchstart'].forEach(e => document.addEventListener(e, resetTimer));
resetTimer();

let allVoters = [];
let bioStatus = {};   // voter_id → true/false

function getInitials(n) { return n.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase(); }
function fmtDate(s) { if (!s) return '—'; try { return new Date(s).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}); } catch{return s;} }
function isToday(s) { return s && new Date(s).toDateString() === new Date().toDateString(); }

async function loadVoters() {
  const grid = document.getElementById('voterGrid');
  grid.innerHTML = [1,2,3,4,5,6].map(()=>`
    <div class="skel-card">
      <div class="skeleton" style="width:65%;height:14px"></div>
      <div class="skeleton" style="width:45%;height:10px;margin-top:8px"></div>
      <div class="skeleton" style="width:80%;height:10px;margin-top:6px"></div>
    </div>`).join('');

  try {
    const [vRes, statsRes] = await Promise.all([
      fetch('http://127.0.0.1:5000/api/voters'),
      fetch('http://127.0.0.1:5000/api/stats')
    ]);
    const vData = await vRes.json();
    allVoters = vData.voters || [];

    // Load bio status for each voter
    await Promise.all(allVoters.map(async v => {
      try {
        const r = await fetch(`http://127.0.0.1:5000/api/biometrics/${v.voter_id}`);
        const d = await r.json();
        bioStatus[v.voter_id] = d.face_saved === true;
      } catch { bioStatus[v.voter_id] = null; }
    }));

    renderVoters(allVoters);
    updateStats(allVoters);
    populateDistrictFilter(allVoters);

    const pendingCount = allVoters.filter(v => !bioStatus[v.voter_id]).length;
    document.getElementById('pendingCount').textContent = pendingCount;
    if (pendingCount > 0) document.getElementById('pendingBanner').classList.add('show');

  } catch {
    grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;color:var(--red);padding:40px;font-size:.9rem;">
      <i class="fa-solid fa-circle-exclamation"></i> Cannot connect to EVRS server. Ensure Flask is running on port 5000.</div>`;
  }
}

function updateStats(voters) {
  document.getElementById('s-total').textContent = voters.length;
  document.getElementById('s-today').textContent = voters.filter(v=>isToday(v.created_at)).length;
  const pending = voters.filter(v=>!bioStatus[v.voter_id]).length;
  document.getElementById('s-pending-bio').textContent = pending;
  document.getElementById('s-active').textContent = voters.filter(v=>v.status==='active').length;
}

function populateDistrictFilter(voters) {
  const districts = [...new Set(voters.map(v=>v.district).filter(Boolean))].sort();
  const sel = document.getElementById('districtFilter');
  sel.innerHTML = '<option value="">All Districts</option>';
  districts.forEach(d => { const o = document.createElement('option'); o.value=d; o.textContent=d; sel.appendChild(o); });
}

function filterCards() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const district = document.getElementById('districtFilter').value;
  const bioF = document.getElementById('bioFilter').value;

  const filtered = allVoters.filter(v => {
    const mQ = !q || [v.name,v.phone,v.email,v.ward_number,v.panchayat,v.district,v.state,v.pincode]
      .some(f=>(f||'').toLowerCase().includes(q));
    const mD = !district || v.district === district;
    const hasBio = bioStatus[v.voter_id] === true;
    const mB = !bioF || (bioF==='done'&&hasBio) || (bioF==='pending'&&!hasBio);
    return mQ && mD && mB;
  });
  renderVoters(filtered);
  document.getElementById('emptyState').style.display = filtered.length ? 'none' : 'block';
}

function renderVoters(voters) {
  const grid = document.getElementById('voterGrid');
  document.getElementById('emptyState').style.display = voters.length ? 'none' : 'block';
  if (!voters.length) { grid.innerHTML = ''; return; }

  grid.innerHTML = voters.map(v => {
    const docs = v.documents || [];
    const hasBio = bioStatus[v.voter_id];
    const bioPillHtml = hasBio === true
      ? `<span class="bio-pill done"><i class="fa-solid fa-circle-check"></i> Biometrics Done</span>`
      : hasBio === false
        ? `<span class="bio-pill pending"><i class="fa-solid fa-triangle-exclamation"></i> Biometrics Pending</span>`
        : `<span class="bio-pill unknown"><i class="fa-regular fa-circle-question"></i> Status Unknown</span>`;

    const bioBtnHtml = !hasBio
      ? `<a href="biometrics-pending.html?voter=${v.voter_id}" class="bio-action-btn"><i class="fa-solid fa-camera"></i> Capture Biometrics</a>`
      : '';

    return `
    <div class="voter-card" id="card-${v.voter_id}" onclick="toggleCard(${v.voter_id})">
      <div class="voter-card-top">
        <div class="voter-avatar">${getInitials(v.name)}</div>
        <div style="flex:1;min-width:0">
          <div class="voter-name">${v.name}</div>
          <div class="voter-id-badge">#${v.voter_id}</div>
          <div class="voter-meta">
            <span><i class="fa-solid fa-venus-mars"></i> ${v.gender||'—'}</span>
            <span><i class="fa-regular fa-calendar"></i> ${v.dob||'—'}</span>
          </div>
          <div class="voter-meta" style="margin-top:2px">
            <span><i class="fa-solid fa-map-pin"></i> ${v.district||'—'}</span>
          </div>
          ${bioPillHtml}
        </div>
      </div>

      <div class="voter-details" id="details-${v.voter_id}">
        <div class="detail-section">
          <div class="detail-section-title">Personal Details</div>
          <div class="detail-grid">
            <div class="detail-item"><div class="detail-label">Full Name</div><div class="detail-value">${v.name}</div></div>
            <div class="detail-item"><div class="detail-label">Date of Birth</div><div class="detail-value">${v.dob||'—'}</div></div>
            <div class="detail-item"><div class="detail-label">Gender</div><div class="detail-value">${v.gender||'—'}</div></div>
            <div class="detail-item"><div class="detail-label">Parent / Guardian</div><div class="detail-value">${v.parent_name||'—'}</div></div>
            <div class="detail-item"><div class="detail-label">Occupation</div><div class="detail-value">${v.occupation||'—'}</div></div>
            <div class="detail-item"><div class="detail-label">Status</div><div class="detail-value"><span style="color:var(--green)">● Active</span></div></div>
          </div>
        </div>
        <div class="detail-section">
          <div class="detail-section-title">Contact &amp; Address</div>
          <div class="detail-grid">
            <div class="detail-item"><div class="detail-label">Mobile</div><div class="detail-value">${v.phone||'—'}</div></div>
            <div class="detail-item"><div class="detail-label">Email</div><div class="detail-value">${v.email||'—'}</div></div>
            <div class="detail-item"><div class="detail-label">Street</div><div class="detail-value">${v.street||'—'}</div></div>
            <div class="detail-item"><div class="detail-label">Ward</div><div class="detail-value">${v.ward_number||'—'}</div></div>
            <div class="detail-item"><div class="detail-label">Panchayat</div><div class="detail-value">${v.panchayat||'—'}</div></div>
            <div class="detail-item"><div class="detail-label">District</div><div class="detail-value">${v.district||'—'}</div></div>
            <div class="detail-item"><div class="detail-label">State</div><div class="detail-value">${v.state||'—'}</div></div>
            <div class="detail-item"><div class="detail-label">PIN Code</div><div class="detail-value">${v.pincode||'—'}</div></div>
            <div class="detail-item"><div class="detail-label">Constituency</div><div class="detail-value">${v.constituency||'—'}</div></div>
          </div>
        </div>
        <div class="detail-section">
          <div class="detail-section-title">Identity Documents</div>
          <div>${docs.length ? docs.map(d=>`<span class="doc-badge"><i class="fa-solid fa-id-card"></i> ${d.document_type}: ${d.document_number}</span>`).join('') : '<span style="font-size:.8rem;color:var(--ink-muted)">No documents recorded</span>'}</div>
        </div>
        <div class="detail-section">
          <div class="detail-section-title">Biometric Status</div>
          ${bioPillHtml}
          ${bioBtnHtml}
        </div>
        <div class="detail-section" style="margin-bottom:0">
          <div class="detail-section-title">Registration Info</div>
          <div class="detail-grid">
            <div class="detail-item"><div class="detail-label">Registered</div><div class="detail-value">${fmtDate(v.created_at)}</div></div>
            <div class="detail-item"><div class="detail-label">Registered By</div><div class="detail-value">${v.officer_id?'Officer #'+v.officer_id:'System'}</div></div>
          </div>
        </div>
      </div>

      <div class="voter-card-footer">
        <span><i class="fa-solid fa-phone"></i> ${v.phone||'—'}</span>
        <span><i class="fa-solid fa-location-dot"></i> ${v.ward_number?'Ward '+v.ward_number:'—'}</span>
        <span class="expand-icon"><i class="fa-solid fa-chevron-down"></i></span>
      </div>
    </div>`;
  }).join('');
}

function toggleCard(id) {
  const card = document.getElementById('card-'+id);
  const isOpen = card.classList.contains('expanded');
  document.querySelectorAll('.voter-card.expanded').forEach(c=>c.classList.remove('expanded'));
  if (!isOpen) { card.classList.add('expanded'); card.scrollIntoView({behavior:'smooth',block:'nearest'}); }
}

function logout() { sessionStorage.removeItem('evrs_officer'); window.location.href = 'logout-summary.html'; }

loadVoters();
</script>
</body>
</html>
