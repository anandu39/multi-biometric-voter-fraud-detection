<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pending Biometrics — EVRS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--ink:#0a0e1a;--ink-soft:#2d3448;--ink-muted:#6b7280;--cream:#faf8f4;--gold:#c9973a;--gold-light:#f0d98a;--blue:#1a3a6b;--blue-mid:#2a5298;--blue-light:#e8eef8;--red:#dc2626;--green:#16a34a;--white:#ffffff;--border:rgba(10,14,26,0.1);--shadow-sm:0 1px 4px rgba(0,0,0,0.05);--shadow-md:0 6px 24px rgba(0,0,0,0.09);}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh;}
header{background:var(--ink);height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 clamp(1rem,4vw,2.5rem);border-bottom:2px solid var(--gold);position:sticky;top:0;z-index:100;}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
.logo-em{width:34px;height:34px;background:linear-gradient(135deg,var(--gold),#8a6520);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:16px;}
.logo-abbr{font-family:'DM Mono',monospace;font-size:13px;color:var(--gold);letter-spacing:.15em;}
.header-right{display:flex;align-items:center;gap:12px;}
.officer-pill{background:rgba(201,151,58,.12);border:1px solid rgba(201,151,58,.25);color:var(--gold-light);padding:5px 12px;border-radius:100px;font-size:.75rem;}
.btn-nav{background:transparent;color:rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.12);padding:6px 14px;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:.78rem;cursor:pointer;text-decoration:none;transition:all .2s;}
.btn-nav:hover{color:white;border-color:rgba(255,255,255,.3);}
.btn-logout{color:#f87171;border-color:rgba(248,113,113,.25);}

main{max-width:1000px;margin:0 auto;padding:clamp(1.5rem,4vw,2.5rem) clamp(1rem,4vw,2rem);}
.page-title{margin-bottom:24px;}
.page-title h1{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:700;margin-bottom:6px;}
.page-title p{font-size:.875rem;color:var(--ink-muted);font-weight:300;}

.alert-banner{background:rgba(220,38,38,.06);border:1px solid rgba(220,38,38,.2);border-radius:10px;padding:14px 18px;margin-bottom:24px;font-size:.875rem;color:#b91c1c;display:flex;align-items:center;gap:10px;}

.search-row{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;}
.search-box{position:relative;flex:1;min-width:200px;}
.search-box input{width:100%;background:var(--white);border:1px solid var(--border);color:var(--ink);padding:9px 14px 9px 38px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.85rem;outline:none;}
.search-box input:focus{border-color:var(--blue-mid);}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px;opacity:.4;pointer-events:none;}
.btn-refresh{background:var(--blue);color:white;border:none;padding:9px 16px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:600;cursor:pointer;}
.count-badge{background:rgba(220,38,38,.1);border:1px solid rgba(220,38,38,.2);color:var(--red);padding:9px 16px;border-radius:8px;font-size:.82rem;font-weight:600;font-family:'DM Mono',monospace;}

.pending-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;}
.pending-card{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:16px;box-shadow:var(--shadow-sm);display:flex;flex-direction:column;gap:10px;}
.pending-card:hover{box-shadow:var(--shadow-md);}
.pcard-top{display:flex;align-items:center;gap:12px;}
.pcard-avatar{width:44px;height:44px;border-radius:10px;background:rgba(220,38,38,.08);border:1px solid rgba(220,38,38,.15);display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;color:var(--red);flex-shrink:0;}
.pcard-name{font-weight:600;font-size:.9rem;color:var(--ink);margin-bottom:2px;}
.pcard-id{font-family:'DM Mono',monospace;font-size:.7rem;color:var(--ink-muted);}
.pcard-meta{display:flex;gap:8px;flex-wrap:wrap;}
.meta-pill{background:var(--cream);border:1px solid var(--border);padding:3px 9px;border-radius:100px;font-size:.7rem;color:var(--ink-muted);}
.pcard-missing{font-size:.75rem;color:var(--red);font-weight:500;}
.btn-capture{width:100%;background:var(--blue);color:white;border:none;padding:10px;border-radius:7px;font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:600;cursor:pointer;transition:background .2s;text-decoration:none;text-align:center;display:block;}
.btn-capture:hover{background:var(--blue-mid);}

.empty-state{text-align:center;padding:60px 20px;color:var(--ink-muted);}
.empty-state .empty-icon{font-size:3rem;opacity:.4;margin-bottom:12px;}

/* INLINE BIOMETRIC UPLOAD PANEL */
.upload-panel{display:none;background:var(--blue-light);border:1px solid rgba(42,82,152,.2);border-radius:10px;padding:16px;margin-top:2px;}
.upload-panel.show{display:block;}
.upload-panel h4{font-size:.8rem;font-weight:700;color:var(--blue);letter-spacing:.06em;text-transform:uppercase;margin-bottom:12px;}
.upload-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.upload-slot{border:2px dashed rgba(42,82,152,.25);border-radius:8px;padding:10px;text-align:center;position:relative;background:white;cursor:pointer;}
.upload-slot.has{border-color:var(--green);border-style:solid;}
.upload-slot input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.upload-slot .us-icon{font-size:1.4rem;display:block;}
.upload-slot .us-label{font-size:.68rem;font-weight:600;color:var(--ink-muted);margin-top:4px;}
.upload-slot .us-req{font-size:.6rem;color:var(--red);}
.upload-slot .us-st{font-size:.65rem;color:var(--green);margin-top:2px;}
.upload-actions{display:flex;gap:8px;margin-top:10px;}
.btn-do-upload{flex:1;background:var(--blue);color:white;border:none;padding:10px;border-radius:7px;font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:600;cursor:pointer;}
.btn-cancel-upload{background:transparent;border:1px solid var(--border);color:var(--ink-muted);padding:10px 14px;border-radius:7px;font-family:'DM Sans',sans-serif;font-size:.82rem;cursor:pointer;}
.spinner{display:inline-block;width:12px;height:12px;border:2px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;margin-right:6px;vertical-align:middle;}
@keyframes spin{to{transform:rotate(360deg);}}

.result-pill{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:100px;font-size:.75rem;font-weight:600;margin-top:4px;}
.result-pill.ok{background:rgba(22,163,74,.1);color:var(--green);}
.result-pill.warn{background:rgba(220,38,38,.1);color:var(--red);}

@media(max-width:600px){
  .pending-grid{grid-template-columns:1fr;}
  .upload-grid{grid-template-columns:1fr 1fr;}
}
</style>
</head>
<body>
<header>
  <a href="index.html" class="logo">
    <div class="logo-em">🗳</div>
    <span class="logo-abbr">EVRS</span>
  </a>
  <div class="header-right">
    <span class="officer-pill" id="officerName">—</span>
    <a href="register.html" class="btn-nav">+ Register Voter</a>
    <a href="voters.html" class="btn-nav">Registry</a>
    <button class="btn-nav btn-logout" onclick="logout()">Sign Out</button>
  </div>
</header>

<main>
  <div class="page-title">
    <h1>Pending Biometrics</h1>
    <p>Voters registered without biometric data. Capture face photo to complete their enrollment.</p>
  </div>

  <div id="alertBanner" style="display:none" class="alert-banner">⚠️ <span id="alertBannerMsg"></span></div>

  <div class="search-row">
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Search by name, ward or district…" oninput="filterCards()">
    </div>
    <div class="count-badge" id="countBadge">— pending</div>
    <button class="btn-refresh" onclick="loadPending()">↻ Refresh</button>
  </div>

  <div id="pendingGrid" class="pending-grid"></div>
  <div class="empty-state" id="emptyState" style="display:none">
    <div class="empty-icon">✅</div>
    <p>All voters have biometrics recorded!</p>
  </div>
</main>

<script>
const session = JSON.parse(sessionStorage.getItem('evrs_officer')||'null');
if (!session || session.expires < Date.now()) window.location.href = 'login.html';
else document.getElementById('officerName').textContent = '👮 ' + session.name;

let allPending = [];
const uploadData = {};  // keyed by voter_id: {face, iris, fp}

function getInitials(name) {
  return name.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();
}

async function loadPending() {
  document.getElementById('pendingGrid').innerHTML = '<div style="padding:30px;color:var(--ink-muted)">Loading…</div>';
  try {
    const res = await fetch('http://127.0.0.1:5000/api/biometrics/pending');
    const data = await res.json();
    allPending = data.pending || [];
    document.getElementById('countBadge').textContent = `${allPending.length} pending`;
    renderCards(allPending);
  } catch {
    document.getElementById('pendingGrid').innerHTML = '<div style="color:var(--red);padding:30px">Cannot connect to server.</div>';
  }
}

function filterCards() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const filtered = q ? allPending.filter(v =>
    [v.name, v.ward_number, v.district, v.phone].some(f => (f||'').toLowerCase().includes(q))
  ) : allPending;
  renderCards(filtered);
}

function renderCards(voters) {
  const grid = document.getElementById('pendingGrid');
  document.getElementById('emptyState').style.display = voters.length ? 'none' : 'block';
  if (!voters.length) { grid.innerHTML = ''; return; }

  grid.innerHTML = voters.map(v => `
    <div class="pending-card" id="pcard-${v.voter_id}">
      <div class="pcard-top">
        <div class="pcard-avatar">${getInitials(v.name)}</div>
        <div>
          <div class="pcard-name">${v.name}</div>
          <div class="pcard-id">Voter #${v.voter_id}</div>
        </div>
      </div>
      <div class="pcard-meta">
        ${v.ward_number ? `<span class="meta-pill">Ward ${v.ward_number}</span>` : ''}
        ${v.district ? `<span class="meta-pill">${v.district}</span>` : ''}
        ${v.phone ? `<span class="meta-pill">📱 ${v.phone}</span>` : ''}
      </div>
      <div class="pcard-missing">⚠ Face photo not captured</div>
      <div class="result-wrap" id="result-${v.voter_id}"></div>
      <button class="btn-capture" onclick="togglePanel(${v.voter_id})">📷 Capture Biometrics</button>

      <!-- UPLOAD PANEL -->
      <div class="upload-panel" id="panel-${v.voter_id}">
        <h4>Upload Biometric Files</h4>
        <div class="upload-grid">
          <div class="upload-slot" id="slot-face-${v.voter_id}">
            <input type="file" accept="image/*" onchange="setFile(${v.voter_id},'face',this)">
            <span class="us-icon">🧑</span>
            <div class="us-label">Face Photo</div>
            <div class="us-req">Required</div>
            <div class="us-st" id="st-face-${v.voter_id}"></div>
          </div>
          <div class="upload-slot" id="slot-iris-${v.voter_id}">
            <input type="file" accept="image/*" onchange="setFile(${v.voter_id},'iris',this)">
            <span class="us-icon">👁</span>
            <div class="us-label">Iris Scan</div>
            <div style="font-size:.6rem;color:var(--ink-muted)">Optional</div>
            <div class="us-st" id="st-iris-${v.voter_id}"></div>
          </div>
          <div class="upload-slot" id="slot-fp-${v.voter_id}">
            <input type="file" accept="image/*" onchange="setFile(${v.voter_id},'fp',this)">
            <span class="us-icon">🖐</span>
            <div class="us-label">Fingerprint</div>
            <div style="font-size:.6rem;color:var(--ink-muted)">Optional</div>
            <div class="us-st" id="st-fp-${v.voter_id}"></div>
          </div>
        </div>
        <div class="upload-actions">
          <button class="btn-do-upload" id="ubtn-${v.voter_id}" onclick="doUpload(${v.voter_id})">Save Biometrics</button>
          <button class="btn-cancel-upload" onclick="togglePanel(${v.voter_id})">Cancel</button>
        </div>
      </div>
    </div>
  `).join('');

  // Init upload data map
  voters.forEach(v => { if (!uploadData[v.voter_id]) uploadData[v.voter_id] = {}; });
}

function togglePanel(id) {
  const panel = document.getElementById(`panel-${id}`);
  panel.classList.toggle('show');
}

function setFile(vid, type, input) {
  if (!uploadData[vid]) uploadData[vid] = {};
  uploadData[vid][type] = input.files[0];
  const slot = document.getElementById(`slot-${type}-${vid}`);
  const st   = document.getElementById(`st-${type}-${vid}`);
  slot.classList.add('has');
  st.textContent = '✓ Ready';
}

async function doUpload(vid) {
  const files = uploadData[vid] || {};
  if (!files.face) {
    showBanner('Face photo is required.'); return;
  }

  const btn = document.getElementById(`ubtn-${vid}`);
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Processing…';

  const fd = new FormData();
  fd.append('voter_id', vid);
  fd.append('face', files.face);
  if (files.iris) fd.append('iris', files.iris);
  if (files.fp)   fd.append('fingerprint', files.fp);

  try {
    const res = await fetch('http://127.0.0.1:5000/api/biometrics/upload', {
      method:'POST', body: fd
    });
    const data = await res.json();

    if (!res.ok) {
      showBanner(data.error || 'Upload failed.');
      return;
    }

    const rw = document.getElementById(`result-${vid}`);
    if (data.duplicate_detected) {
      const di = data.duplicate_info;
      rw.innerHTML = `<div class="result-pill warn">⚠️ Duplicate — ${di.similarity_percent} match with #${di.matched_voter_id}</div>`;
    } else {
      rw.innerHTML = `<div class="result-pill ok">✓ Biometrics saved successfully</div>`;
    }

    // Remove from pending list after short delay
    setTimeout(() => {
      allPending = allPending.filter(v => v.voter_id !== vid);
      document.getElementById('countBadge').textContent = `${allPending.length} pending`;
      document.getElementById(`pcard-${vid}`).style.opacity = '0.5';
      document.getElementById(`pcard-${vid}`).style.pointerEvents = 'none';
    }, 1500);

  } catch {
    showBanner('Cannot connect to server.');
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'Save Biometrics';
  }
}

function showBanner(msg) {
  document.getElementById('alertBanner').style.display = 'flex';
  document.getElementById('alertBannerMsg').textContent = msg;
  setTimeout(() => document.getElementById('alertBanner').style.display='none', 4000);
}

function logout() {
  sessionStorage.removeItem('evrs_officer');
  window.location.href = 'logout-summary.html';
}

loadPending();
</script>
</body>
</html>
