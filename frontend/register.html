<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Voter Enrollment | E-VOTER AUTH PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

<style>

body{
font-family:'Inter',sans-serif;
background-color:#f4f7f9;
}

.navbar{
border-bottom:3px solid #0d6efd;
}

.registration-card{
border:none;
border-radius:16px;
}

.form-section-header{
border-left:5px solid #0d6efd;
padding-left:15px;
margin:35px 0 20px 0;
font-weight:700;
text-transform:uppercase;
font-size:0.85rem;
color:#495057;
}

.btn-register{
padding:14px 40px;
font-weight:600;
border-radius:12px;
transition:all 0.3s;
}

.btn-register:hover{
transform:translateY(-2px);
box-shadow:0 5px 15px rgba(13,110,253,0.3);
}

.remove-doc{
margin-top:32px;
}

</style>

</head>

<body>

<nav class="navbar navbar-dark bg-dark sticky-top">
<div class="container">

<a href="index.html" class="navbar-brand fw-bold d-flex align-items-center">
<i class="bi bi-shield-shaded me-2 text-primary"></i>
E-VOTER AUTH PRO
</a>

<span class="badge bg-success-subtle text-success border border-success-subtle">
Secure Session Active
</span>

</div>
</nav>

<div class="container mt-4 mb-5">

<div class="row justify-content-center">

<div class="col-lg-10">

<div class="card registration-card shadow-lg">

<div class="card-body p-4 p-md-5">

<div class="text-center mb-5">

<h2 class="fw-bold">Voter Identity Enrollment</h2>

<p class="text-muted">
Standard protocol for citizen demographic and identity data collection
</p>

</div>

<form id="registerForm">

<div class="form-section-header">Citizen Demographics</div>

<div class="row g-3">

<div class="col-md-7">

<label class="form-label fw-semibold">Legal Full Name</label>

<input type="text"
class="form-control form-control-lg"
id="name"
maxlength="100"
pattern="[A-Za-z\s]+"
required>

</div>

<div class="col-md-5">

<label class="form-label fw-semibold">Date of Birth</label>

<input type="date"
class="form-control form-control-lg"
id="dob"
required>

</div>

<div class="col-md-4">

<label class="form-label fw-semibold">Gender</label>

<select class="form-select form-select-lg" id="gender">
<option value="Male">Male</option>
<option value="Female">Female</option>
<option value="Other">Other</option>
</select>

</div>

<div class="col-md-4">

<label class="form-label fw-semibold">Phone Number</label>

<input type="tel"
class="form-control form-control-lg"
id="phone"
maxlength="12"
placeholder="98765 43210"
required>

</div>

<div class="col-md-4">

<label class="form-label fw-semibold">Email (Optional)</label>

<input type="email"
class="form-control form-control-lg"
id="email"
maxlength="100">

</div>

<div class="col-12">

<label class="form-label fw-semibold">Address</label>

<textarea class="form-control"
id="address"
rows="2"
maxlength="300"
required></textarea>

</div>

</div>

<div class="form-section-header">Identity Documents</div>

<div id="documentsContainer">

<div class="row g-3 document-row">

<div class="col-md-5">

<label class="form-label fw-semibold">ID Type</label>

<select class="form-select form-select-lg document-type">

<option value="AADHAAR">Aadhaar</option>
<option value="VOTER_ID">Voter ID</option>
<option value="PASSPORT">Passport</option>
<option value="DRIVING_LICENSE">Driving License</option>

</select>

</div>

<div class="col-md-5">

<label class="form-label fw-semibold">ID Number</label>

<input type="text"
class="form-control form-control-lg document-number"
placeholder="Enter ID Number"
required>

</div>

<div class="col-md-2">

<button type="button"
class="btn btn-outline-danger remove-doc">
Remove
</button>

</div>

</div>

</div>

<div class="mt-3">

<button type="button"
id="addDocument"
class="btn btn-outline-primary">

<i class="bi bi-plus-circle"></i>
Add Another ID

</button>

</div>

<div class="mt-5 pt-4 border-top d-flex justify-content-between align-items-center">

<div class="text-muted small">
<i class="bi bi-lock-fill text-success"></i>
Secure encrypted submission
</div>

<button type="submit"
id="submitBtn"
class="btn btn-primary btn-register px-5">

<i class="bi bi-person-plus-fill me-2"></i>
Confirm Enrollment

</button>

</div>

</form>

<div id="message" class="mt-4"></div>

</div>

</div>

</div>

</div>

</div>

<script>

/* Prevent future DOB */
document.getElementById('dob').max = new Date().toISOString().split("T")[0];

/* PHONE AUTO FORMAT */

document.getElementById("phone").addEventListener("input",function(){

let digits=this.value.replace(/\D/g,'')

if(digits.length>5){
this.value=digits.substring(0,5)+" "+digits.substring(5,10)
}else{
this.value=digits
}

})

/* AADHAAR AUTO FORMAT */

document.addEventListener("input",function(e){

if(e.target.classList.contains("document-number")){

let digits=e.target.value.replace(/\D/g,'')

let formatted=digits.match(/.{1,4}/g)

if(formatted){
e.target.value=formatted.join(" ")
}else{
e.target.value=digits
}

}

})

/* ADD DOCUMENT ROW */

document.getElementById("addDocument").addEventListener("click",function(){

const container=document.getElementById("documentsContainer")

const row=document.createElement("div")
row.className="row g-3 document-row mt-2"

row.innerHTML=`

<div class="col-md-5">

<select class="form-select form-select-lg document-type">

<option value="AADHAAR">Aadhaar</option>
<option value="VOTER_ID">Voter ID</option>
<option value="PASSPORT">Passport</option>
<option value="DRIVING_LICENSE">Driving License</option>

</select>

</div>

<div class="col-md-5">

<input type="text"
class="form-control form-control-lg document-number"
placeholder="Enter ID Number"
required>

</div>

<div class="col-md-2">

<button type="button"
class="btn btn-outline-danger remove-doc">
Remove
</button>

</div>
`

container.appendChild(row)

})

/* REMOVE DOCUMENT */

document.addEventListener("click",function(e){

if(e.target.classList.contains("remove-doc")){

const rows=document.querySelectorAll(".document-row")

if(rows.length>1){
e.target.closest(".document-row").remove()
}

}

})

function sanitize(str){

if(!str) return ""

return str
.replace(/[<>'"\/]/g,"")
.replace(/\s+/g," ")
.trim()

}

document.getElementById("registerForm").addEventListener("submit", async function(e){

e.preventDefault()

if(!this.checkValidity()){
this.reportValidity()
return
}

/* AGE VALIDATION */

const dobValue=document.getElementById("dob").value
const dob=new Date(dobValue)
const today=new Date()

let age=today.getFullYear()-dob.getFullYear()
const month=today.getMonth()-dob.getMonth()

if(month<0 || (month===0 && today.getDate()<dob.getDate())){
age--
}

if(age<18){

document.getElementById("message").innerHTML=

`<div class="alert alert-danger">
<i class="bi bi-exclamation-octagon"></i>
Voter must be at least 18 years old.
</div>`

return

}

const btn=document.getElementById("submitBtn")
const original=btn.innerHTML

btn.disabled=true
btn.innerHTML=`<span class="spinner-border spinner-border-sm"></span> Processing...`

/* COLLECT DOCUMENTS */

const documents=[]

document.querySelectorAll(".document-row").forEach(row=>{

const type=row.querySelector(".document-type").value
const number=row.querySelector(".document-number").value.replace(/\s/g,"")

documents.push({
type:type,
number:sanitize(number)
})

})

const payload={

name:sanitize(document.getElementById("name").value),
dob:dobValue,
gender:document.getElementById("gender").value,
phone:sanitize(document.getElementById("phone").value).replace(/\s/g,""),
email:sanitize(document.getElementById("email").value),
address:sanitize(document.getElementById("address").value),

documents:documents

}

try{

const controller=new AbortController()
const timeout=setTimeout(()=>controller.abort(),10000)

const response=await fetch("http://127.0.0.1:5000/api/register-voter",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(payload),
signal:controller.signal

})

clearTimeout(timeout)

let result

try{
result=await response.json()
}catch{
result={message:"Unexpected server response"}
}

if(!response.ok){
throw new Error(result.message || "Registration failed")
}

document.getElementById("message").innerHTML=

`<div class="alert alert-success">
<i class="bi bi-check-circle"></i> ${result.message}
</div>`

document.getElementById("registerForm").reset()

}
catch(error){

let msg="Registration failed"

if(error.name==="AbortError"){
msg="Server timeout. Please try again."
}else{
msg=error.message
}

document.getElementById("message").innerHTML=

`<div class="alert alert-danger">
<i class="bi bi-exclamation-octagon"></i> ${msg}
</div>`

}
finally{

btn.disabled=false
btn.innerHTML=original

document.getElementById("message").scrollIntoView({behavior:"smooth"})

}

})

</script>

</body>
</html>
