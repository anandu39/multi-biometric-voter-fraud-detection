<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Approval — EVRS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{
  --cream:#f5f0e8;--cream-dark:#ede5d8;--beige:#e8dcc8;--parchment:#faf6ee;
  --ink:#1a1a2e;--ink-soft:#2d3448;--ink-muted:#6b7280;
  --gold:#b8860b;--gold-bright:#d4a017;--gold-light:#f0d98a;
  --navy:#1a3a6b;--navy-mid:#2a5298;--navy-light:#dde8f8;
  --red:#c0392b;--green:#1a6b3a;--green-light:#d4f1df;
  --orange:#c05c00;--orange-light:#fff3e0;
  --white:#fff;--border:rgba(26,26,46,0.1);
  --shadow-sm:0 1px 4px rgba(0,0,0,0.06);--shadow-md:0 6px 24px rgba(0,0,0,0.1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh;}

header{background:var(--parchment);border-bottom:2px solid var(--gold);height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 clamp(1rem,4vw,2.5rem);position:sticky;top:0;z-index:100;box-shadow:var(--shadow-sm);}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
.logo-em{width:34px;height:34px;background:linear-gradient(135deg,var(--gold),#7a5c00);border-radius:7px;display:flex;align-items:center;justify-content:center;color:white;font-size:15px;}
.logo-abbr{font-family:'DM Mono',monospace;font-size:13px;color:var(--gold);letter-spacing:.15em;}
.header-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.officer-pill{background:var(--navy-light);border:1px solid rgba(42,82,152,.2);color:var(--navy);padding:5px 12px;border-radius:100px;font-size:.75rem;font-weight:600;}
.supervisor-pill{background:#f0fdf4;border:1px solid rgba(26,107,58,.25);color:var(--green);padding:5px 12px;border-radius:100px;font-size:.72rem;font-weight:700;}
.btn-nav{background:transparent;color:var(--ink-soft);border:1.5px solid var(--border);padding:6px 14px;border-radius:7px;font-family:'DM Sans',sans-serif;font-size:.78rem;font-weight:500;cursor:pointer;text-decoration:none;transition:all .2s;}
.btn-nav:hover{background:var(--beige);}
.btn-logout{color:var(--red);border-color:rgba(192,57,43,.25);}

main{max-width:1100px;margin:0 auto;padding:clamp(1.5rem,4vw,2.5rem) clamp(1rem,4vw,2rem);}

.top-bar{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:22px;flex-wrap:wrap;}
.page-title h1{font-family:'Playfair Display',serif;font-size:1.7rem;font-weight:700;}
.page-title p{font-size:.82rem;color:var(--ink-muted);}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:22px;}
.stat-card{background:var(--parchment);border:1.5px solid var(--beige);border-radius:10px;padding:14px;text-align:center;box-shadow:var(--shadow-sm);}
.stat-num{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:700;color:var(--navy);}
.stat-num.orange{color:var(--orange);}
.stat-num.green{color:var(--green);}
.stat-num.red{color:var(--red);}
.stat-lbl{font-size:.68rem;color:var(--ink-muted);text-transform:uppercase;letter-spacing:.07em;margin-top:3px;font-weight:600;}

/* TABS */
.tab-row{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;}
.tab-btn{background:var(--parchment);border:1.5px solid var(--beige);color:var(--ink-muted);padding:8px 18px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:600;cursor:pointer;transition:all .2s;}
.tab-btn.active{background:var(--navy);color:white;border-color:var(--navy);}
.badge{display:inline-flex;align-items:center;justify-content:center;background:var(--red);color:white;border-radius:100px;font-size:.6rem;font-weight:700;min-width:18px;height:18px;padding:0 5px;margin-left:6px;}

/* VOTER CARDS */
.voters-list{display:flex;flex-direction:column;gap:14px;}
.voter-card{background:var(--parchment);border:1.5px solid var(--beige);border-radius:12px;overflow:hidden;box-shadow:var(--shadow-sm);}
.voter-card.pending-card{border-color:rgba(192,92,0,.3);background:linear-gradient(to right,rgba(255,243,224,.4),var(--parchment));}
.voter-card.approved-card{border-color:rgba(26,107,58,.3);}
.voter-card.rejected-card{border-color:rgba(192,57,43,.3);}

.vc-top{padding:16px 18px;display:flex;align-items:flex-start;gap:14px;}
.vc-avatar{width:46px;height:46px;border-radius:11px;background:var(--navy-light);color:var(--navy);display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-weight:700;font-size:1.1rem;flex-shrink:0;}
.vc-info{flex:1;min-width:0;}
.vc-name{font-weight:700;font-size:.95rem;color:var(--ink);}
.vc-id{font-family:'DM Mono',monospace;font-size:.68rem;color:var(--ink-muted);background:var(--cream-dark);padding:2px 7px;border-radius:4px;display:inline-block;margin-top:3px;}
.vc-meta{display:flex;flex-wrap:wrap;gap:10px;margin-top:6px;font-size:.78rem;color:var(--ink-muted);}
.status-pill{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:100px;font-size:.68rem;font-weight:700;margin-top:6px;}
.sp-pending{background:var(--orange-light);color:var(--orange);border:1px solid rgba(192,92,0,.3);}
.sp-active{background:var(--green-light);color:var(--green);}
.sp-rejected{background:#fef2f2;color:var(--red);border:1px solid rgba(192,57,43,.2);}

.vc-details{padding:0 18px 16px 18px;display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;}
.vc-field-label{font-size:.65rem;font-weight:700;color:var(--ink-muted);text-transform:uppercase;letter-spacing:.06em;}
.vc-field-value{font-size:.82rem;color:var(--ink-soft);margin-top:2px;}
.docs-row{padding:0 18px 14px;display:flex;flex-wrap:wrap;gap:6px;}
.doc-tag{background:var(--navy-light);color:var(--navy);padding:3px 10px;border-radius:5px;font-size:.7rem;font-family:'DM Mono',monospace;}

/* ACTION AREA */
.vc-actions{padding:14px 18px;background:var(--cream-dark);border-top:1px solid var(--beige);display:flex;align-items:flex-start;gap:12px;flex-wrap:wrap;}
.btn-approve{background:var(--green);color:white;border:none;padding:9px 20px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:7px;transition:opacity .2s;}
.btn-approve:hover{opacity:.85;}
.btn-reject-action{background:transparent;color:var(--red);border:2px solid var(--red);padding:9px 20px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:7px;transition:all .2s;}
.btn-reject-action:hover{background:var(--red);color:white;}
.remarks-wrap{flex:1;min-width:200px;}
.remarks-wrap input{width:100%;border:1.5px solid var(--beige);background:white;color:var(--ink);padding:9px 12px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.82rem;outline:none;}
.remarks-wrap input:focus{border-color:var(--navy);}
.reject-reason-wrap{flex:1;min-width:200px;}
.reject-reason-wrap input{width:100%;border:1.5px solid rgba(192,57,43,.4);background:white;color:var(--ink);padding:9px 12px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.82rem;outline:none;}

.already-done{font-size:.8rem;color:var(--ink-muted);font-style:italic;padding:4px 0;}

/* LOADING / EMPTY */
.empty-state{text-align:center;padding:60px 20px;color:var(--ink-muted);}
.empty-icon{font-size:3rem;opacity:.35;margin-bottom:10px;}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.4);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px;}
.spinner-dark{border-color:rgba(26,26,46,.15);border-top-color:var(--navy);}
@keyframes spin{to{transform:rotate(360deg);}}

.toast{position:fixed;bottom:24px;right:24px;padding:14px 20px;border-radius:10px;font-size:.85rem;font-weight:600;z-index:999;display:none;box-shadow:var(--shadow-md);}
.toast.show{display:flex;align-items:center;gap:10px;}
.toast.success{background:var(--green);color:white;}
.toast.error{background:var(--red);color:white;}

@media(max-width:600px){
  .vc-details{grid-template-columns:1fr;}
  .vc-actions{flex-direction:column;}
}
</style>
</head>
<body>

<header>
  <a href="index.html" class="logo">
    <div class="logo-em"><i class="fa-solid fa-landmark-dome"></i></div>
    <span class="logo-abbr">EVRS</span>
  </a>
  <div class="header-right">
    <span class="supervisor-pill"><i class="fa-solid fa-shield-halved"></i> Supervisor</span>
    <span class="officer-pill" id="officerName">—</span>
    <a href="voters.html" class="btn-nav"><i class="fa-solid fa-users"></i> All Voters</a>
    <a href="fraud-alerts.html" class="btn-nav"><i class="fa-solid fa-triangle-exclamation"></i> Fraud Alerts</a>
    <button class="btn-nav btn-logout" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> Sign Out</button>
  </div>
</header>

<main>
  <div class="top-bar">
    <div class="page-title">
      <h1>Admin Approval Panel</h1>
      <p>Review and approve/reject new voter registrations</p>
    </div>
    <button class="btn-nav" onclick="loadAll()" style="background:var(--navy);color:white;border-color:var(--navy)">
      <i class="fa-solid fa-rotate-right"></i> Refresh
    </button>
  </div>

  <!-- STATS -->
  <div class="stats-row">
    <div class="stat-card"><div class="stat-num orange" id="sPending">—</div><div class="stat-lbl">Pending Approval</div></div>
    <div class="stat-card"><div class="stat-num green" id="sApproved">—</div><div class="stat-lbl">Approved (Active)</div></div>
    <div class="stat-card"><div class="stat-num red" id="sRejected">—</div><div class="stat-lbl">Rejected</div></div>
    <div class="stat-card"><div class="stat-num" id="sTotal">—</div><div class="stat-lbl">Total Registered</div></div>
    <div class="stat-card"><div class="stat-num red" id="sFraud">—</div><div class="stat-lbl">Fraud Alerts</div></div>
  </div>

  <!-- TABS -->
  <div class="tab-row">
    <button class="tab-btn active" onclick="setTab('pending', this)">
      <i class="fa-solid fa-clock"></i> Pending <span class="badge" id="pendingBadge">0</span>
    </button>
    <button class="tab-btn" onclick="setTab('active', this)">
      <i class="fa-solid fa-circle-check"></i> Approved
    </button>
    <button class="tab-btn" onclick="setTab('rejected', this)">
      <i class="fa-solid fa-circle-xmark"></i> Rejected
    </button>
    <button class="tab-btn" onclick="setTab('all', this)">
      <i class="fa-solid fa-list"></i> All
    </button>
  </div>

  <!-- VOTER LIST -->
  <div class="voters-list" id="votersList">
    <div class="empty-state">
      <div class="empty-icon"><i class="fa-solid fa-spinner fa-spin"></i></div>
      <p>Loading...</p>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
// ── AUTH ──────────────────────────────────────────────────────────────────────
const session = JSON.parse(sessionStorage.getItem('evrs_officer') || 'null');
if (!session || session.expires < Date.now()) {
  window.location.href = 'login.html';
} else if (session.role !== 'supervisor') {
  alert('Access denied. Only supervisors can access the Admin Approval Panel.');
  window.location.href = 'index.html';
} else {
  document.getElementById('officerName').textContent = session.name;
}

let allVoters = [];
let activeTab = 'pending';

// ── LOAD ──────────────────────────────────────────────────────────────────────
async function loadAll() {
  showLoading();
  try {
    const [votersRes, statsRes] = await Promise.all([
      fetch('http://127.0.0.1:5000/api/voters'),
      fetch('http://127.0.0.1:5000/api/admin/stats')
    ]);
    const votersData = await votersRes.json();
    const statsData = await statsRes.json();

    allVoters = votersData.voters || [];

    // Update stats
    document.getElementById('sPending').textContent  = statsData.pending_approval ?? '—';
    document.getElementById('sApproved').textContent = statsData.active_voters ?? '—';
    document.getElementById('sRejected').textContent = statsData.rejected_voters ?? '—';
    document.getElementById('sTotal').textContent    = statsData.total_voters ?? '—';
    document.getElementById('sFraud').textContent    = statsData.fraud_total ?? '—';

    const pendingCount = allVoters.filter(v => v.status === 'pending_approval').length;
    document.getElementById('pendingBadge').textContent = pendingCount;

    renderVoters();
  } catch(e) {
    document.getElementById('votersList').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon"><i class="fa-solid fa-circle-exclamation" style="color:var(--red)"></i></div>
        <p>Cannot connect to EVRS server. Make sure Flask is running on port 5000.</p>
      </div>`;
  }
}

function setTab(tab, btn) {
  activeTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderVoters();
}

function renderVoters() {
  const filtered = allVoters.filter(v => {
    if (activeTab === 'pending')  return v.status === 'pending_approval';
    if (activeTab === 'active')   return v.status === 'active';
    if (activeTab === 'rejected') return v.status === 'rejected';
    return true;
  });

  if (!filtered.length) {
    document.getElementById('votersList').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon"><i class="fa-solid fa-inbox"></i></div>
        <p>No voters in this category.</p>
      </div>`;
    return;
  }

  document.getElementById('votersList').innerHTML = filtered.map(v => {
    const initials = v.name.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();
    const docs = v.documents || [];
    const isPending  = v.status === 'pending_approval';
    const isApproved = v.status === 'active';
    const isRejected = v.status === 'rejected';

    const cardClass  = isPending ? 'pending-card' : isApproved ? 'approved-card' : 'rejected-card';
    const pillClass  = isPending ? 'sp-pending' : isApproved ? 'sp-active' : 'sp-rejected';
    const pillText   = isPending ? '<i class="fa-solid fa-clock"></i> Pending Approval'
                     : isApproved ? '<i class="fa-solid fa-circle-check"></i> Approved'
                     : '<i class="fa-solid fa-circle-xmark"></i> Rejected';

    const actionsHtml = isPending ? `
      <div class="remarks-wrap">
        <input type="text" id="remarks-${v.voter_id}" placeholder="Remarks (optional)..." />
      </div>
      <div class="reject-reason-wrap">
        <input type="text" id="reason-${v.voter_id}" placeholder="Rejection reason (required to reject)..." />
      </div>
      <button class="btn-approve" onclick="approve(${v.voter_id})">
        <i class="fa-solid fa-check"></i> Approve
      </button>
      <button class="btn-reject-action" onclick="reject(${v.voter_id})">
        <i class="fa-solid fa-xmark"></i> Reject
      </button>
    ` : `<span class="already-done">This voter has been ${v.status === 'active' ? 'approved' : 'rejected'} already.</span>`;

    return `
    <div class="voter-card ${cardClass}">
      <div class="vc-top">
        <div class="vc-avatar">${initials}</div>
        <div class="vc-info">
          <div class="vc-name">${v.name}</div>
          <div class="vc-id">#${v.voter_id}</div>
          <div class="vc-meta">
            <span><i class="fa-solid fa-venus-mars"></i> ${v.gender||'—'}</span>
            <span><i class="fa-regular fa-calendar"></i> ${v.dob||'—'}</span>
            <span><i class="fa-solid fa-phone"></i> ${v.phone||'—'}</span>
            <span><i class="fa-solid fa-location-dot"></i> ${v.district||'—'}, Ward ${v.ward_number||'—'}</span>
          </div>
          <span class="status-pill ${pillClass}">${pillText}</span>
        </div>
      </div>

      <div class="vc-details">
        <div><div class="vc-field-label">Father / Guardian</div><div class="vc-field-value">${v.parent_name||'—'}</div></div>
        <div><div class="vc-field-label">Email</div><div class="vc-field-value">${v.email||'—'}</div></div>
        <div><div class="vc-field-label">Address</div><div class="vc-field-value">${v.street||'—'}, ${v.panchayat||'—'}</div></div>
        <div><div class="vc-field-label">Constituency</div><div class="vc-field-value">${v.constituency||'—'}</div></div>
        <div><div class="vc-field-label">Pincode</div><div class="vc-field-value">${v.pincode||'—'}</div></div>
        <div><div class="vc-field-label">Registered On</div><div class="vc-field-value">${fmtDate(v.created_at)}</div></div>
      </div>

      ${docs.length ? `
      <div class="docs-row">
        ${docs.map(d => `<span class="doc-tag"><i class="fa-solid fa-id-card"></i> ${d.document_type}: ${d.document_number}</span>`).join('')}
      </div>` : ''}

      <div class="vc-actions">${actionsHtml}</div>
    </div>`;
  }).join('');
}

// ── APPROVE ───────────────────────────────────────────────────────────────────
async function approve(voterId) {
  const remarks = document.getElementById(`remarks-${voterId}`)?.value.trim() || 'Approved by supervisor';
  try {
    const res = await fetch('http://127.0.0.1:5000/api/admin/approve-voter', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ voter_id: voterId, officer_id: session.officer_id, remarks })
    });
    const data = await res.json();
    if (res.ok) {
      showToast(data.message, 'success');
      loadAll();
    } else {
      showToast(data.error || 'Approval failed', 'error');
    }
  } catch {
    showToast('Server connection failed', 'error');
  }
}

// ── REJECT ────────────────────────────────────────────────────────────────────
async function reject(voterId) {
  const reason = document.getElementById(`reason-${voterId}`)?.value.trim();
  if (!reason) {
    showToast('Please enter a rejection reason', 'error');
    document.getElementById(`reason-${voterId}`).focus();
    return;
  }
  try {
    const res = await fetch('http://127.0.0.1:5000/api/admin/reject-voter', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ voter_id: voterId, officer_id: session.officer_id, reason })
    });
    const data = await res.json();
    if (res.ok) {
      showToast(data.message, 'success');
      loadAll();
    } else {
      showToast(data.error || 'Rejection failed', 'error');
    }
  } catch {
    showToast('Server connection failed', 'error');
  }
}

function fmtDate(s) {
  if (!s) return '—';
  try { return new Date(s).toLocaleDateString('en-IN', {day:'2-digit', month:'short', year:'numeric'}); }
  catch { return s; }
}

function showLoading() {
  document.getElementById('votersList').innerHTML = `
    <div class="empty-state">
      <div class="empty-icon"><i class="fa-solid fa-spinner fa-spin"></i></div>
      <p>Loading voters...</p>
    </div>`;
}

function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.className = `toast show ${type}`;
  t.innerHTML = `<i class="fa-solid fa-${type === 'success' ? 'circle-check' : 'circle-exclamation'}"></i> ${msg}`;
  setTimeout(() => t.classList.remove('show'), 3500);
}

function logout() { sessionStorage.removeItem('evrs_officer'); window.location.href = 'logout-summary.html'; }

loadAll();
</script>
</body>
</html>
