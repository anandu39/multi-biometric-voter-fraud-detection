<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Session Summary — EVRS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{
  --cream:#f5f0e8;--cream-dark:#ede5d8;--beige:#e8dcc8;--parchment:#faf6ee;
  --ink:#1a1a2e;--ink-soft:#2d3448;--ink-muted:#6b7280;
  --gold:#b8860b;--gold-bright:#d4a017;--gold-light:#f0d98a;
  --navy:#1a3a6b;--navy-mid:#2a5298;--navy-light:#dde8f8;
  --green:#1a6b3a;--white:#fff;--border:rgba(26,26,46,.1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh;display:flex;flex-direction:column;}
header{background:var(--parchment);border-bottom:2px solid var(--gold);height:60px;display:flex;align-items:center;padding:0 clamp(1rem,4vw,2.5rem);box-shadow:0 1px 4px rgba(0,0,0,.06);}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
.logo-em{width:34px;height:34px;background:linear-gradient(135deg,var(--gold),#7a5c00);border-radius:7px;display:flex;align-items:center;justify-content:center;color:white;font-size:15px;}
.logo-abbr{font-family:'DM Mono',monospace;font-size:13px;color:var(--gold);letter-spacing:.15em;}
.page{flex:1;padding:clamp(2rem,5vw,3rem) 1rem;}
.wrap{width:100%;max-width:700px;margin:0 auto;}
.summary-header{text-align:center;margin-bottom:32px;}
.summary-icon{font-size:3.5rem;color:var(--gold);margin-bottom:12px;}
.summary-header h1{font-family:'Playfair Display',serif;font-size:2rem;font-weight:700;margin-bottom:6px;}
.summary-header p{color:var(--ink-muted);font-size:.9rem;}

.info-card{background:var(--parchment);border:1.5px solid var(--beige);border-radius:12px;padding:20px 24px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--beige);font-size:.875rem;}
.info-row:last-child{border-bottom:none;}
.info-label{color:var(--ink-muted);font-size:.72rem;text-transform:uppercase;letter-spacing:.07em;font-weight:600;display:flex;align-items:center;gap:7px;}
.info-value{color:var(--ink-soft);font-weight:600;font-family:'DM Mono',monospace;font-size:.82rem;}

.stat-big{background:linear-gradient(135deg,var(--navy) 0%,#0d2240 100%);border-radius:12px;padding:24px;text-align:center;margin-bottom:16px;}
.stat-big-num{font-family:'Playfair Display',serif;font-size:4rem;font-weight:900;color:var(--gold-light);line-height:1;}
.stat-big-label{color:rgba(255,255,255,.5);font-size:.78rem;margin-top:8px;text-transform:uppercase;letter-spacing:.08em;}

.ward-card{background:var(--parchment);border:1.5px solid var(--beige);border-radius:12px;padding:20px 24px;margin-bottom:16px;}
.section-title{font-size:.7rem;font-weight:700;color:var(--gold);letter-spacing:.12em;text-transform:uppercase;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--beige);}
.ward-row{display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--beige);}
.ward-row:last-child{border-bottom:none;}
.ward-name{font-size:.85rem;flex:1;color:var(--ink-soft);font-weight:500;}
.ward-bar-wrap{flex:2;height:7px;background:var(--cream-dark);border-radius:4px;overflow:hidden;}
.ward-bar{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-bright));border-radius:4px;transition:width .8s ease;}
.ward-count{font-family:'DM Mono',monospace;font-size:.8rem;color:var(--gold);min-width:28px;text-align:right;font-weight:700;}

/* TODAY'S VOTER LIST */
.voter-list-card{background:var(--parchment);border:1.5px solid var(--beige);border-radius:12px;margin-bottom:16px;overflow:hidden;}
.voter-list-header{padding:14px 20px;border-bottom:1px solid var(--beige);display:flex;align-items:center;justify-content:space-between;}
.voter-list-header span{font-size:.7rem;font-weight:700;color:var(--gold);letter-spacing:.1em;text-transform:uppercase;}
.voter-list-toggle{background:transparent;border:1.5px solid var(--beige);color:var(--navy);padding:5px 12px;border-radius:7px;font-family:'DM Sans',sans-serif;font-size:.75rem;font-weight:600;cursor:pointer;}
.voter-list-body{display:none;}
.voter-list-body.show{display:block;}
.voter-list-item{display:flex;align-items:center;gap:12px;padding:10px 20px;border-bottom:1px solid var(--beige);}
.voter-list-item:last-child{border-bottom:none;}
.vli-avatar{width:36px;height:36px;border-radius:9px;background:var(--navy-light);color:var(--navy);display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-weight:700;font-size:.9rem;flex-shrink:0;}
.vli-name{font-size:.85rem;font-weight:600;color:var(--ink);}
.vli-meta{font-size:.72rem;color:var(--ink-muted);display:flex;gap:10px;margin-top:2px;}
.vli-bio{font-size:.68rem;padding:2px 8px;border-radius:100px;font-weight:700;}
.vli-bio.done{background:#d4f1df;color:var(--green);}
.vli-bio.pending{background:#fef3c7;color:#92400e;}
.no-data{color:var(--ink-muted);font-size:.85rem;text-align:center;padding:16px;}

.actions{display:flex;gap:12px;margin-top:8px;}
.btn-action{flex:1;padding:13px;border-radius:9px;font-family:'DM Sans',sans-serif;font-size:.875rem;font-weight:700;cursor:pointer;text-decoration:none;text-align:center;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-primary{background:linear-gradient(135deg,var(--gold),#7a5c00);color:white;border:none;}
.btn-primary:hover{opacity:.9;}
.btn-secondary{background:transparent;color:var(--ink-soft);border:1.5px solid var(--beige);}
.btn-secondary:hover{background:var(--beige);}
footer{text-align:center;padding:16px;color:var(--ink-muted);font-size:.75rem;border-top:1px solid var(--beige);}
</style>
</head>
<body>
<header>
  <a href="index.html" class="logo">
    <div class="logo-em"><i class="fa-solid fa-landmark-dome"></i></div>
    <span class="logo-abbr">EVRS</span>
  </a>
</header>

<div class="page">
  <div class="wrap">
    <div class="summary-header">
      <div class="summary-icon"><i class="fa-solid fa-flag-checkered"></i></div>
      <h1>Session Complete</h1>
      <p>Here is a summary of today's registration activity.</p>
    </div>

    <div class="info-card">
      <div class="info-row">
        <span class="info-label"><i class="fa-solid fa-user-shield"></i> Officer</span>
        <span class="info-value" id="sumOfficer">—</span>
      </div>
      <div class="info-row">
        <span class="info-label"><i class="fa-regular fa-calendar"></i> Date</span>
        <span class="info-value" id="sumDate">—</span>
      </div>
      <div class="info-row">
        <span class="info-label"><i class="fa-regular fa-clock"></i> Session Ended</span>
        <span class="info-value" id="sumTime">—</span>
      </div>
    </div>

    <div class="stat-big">
      <div class="stat-big-num" id="todayCount">—</div>
      <div class="stat-big-label">Voters Enrolled Today</div>
    </div>

    <div class="ward-card">
      <div class="section-title">Ward-wise Registrations (Today)</div>
      <div id="wardList"><div class="no-data">Loading…</div></div>
    </div>

    <!-- Today's registered voters list -->
    <div class="voter-list-card">
      <div class="voter-list-header">
        <span>Voters Registered Today</span>
        <button class="voter-list-toggle" onclick="toggleVoterList(this)">Show List</button>
      </div>
      <div class="voter-list-body" id="voterListBody">
        <div class="no-data" id="voterListContent">Loading…</div>
      </div>
    </div>

    <div class="actions">
      <a href="login.html" class="btn-action btn-primary"><i class="fa-solid fa-right-to-bracket"></i> Sign In Again</a>
      <a href="index.html" class="btn-action btn-secondary"><i class="fa-solid fa-house"></i> Home</a>
    </div>
  </div>
</div>

<footer>EVRS &nbsp;·&nbsp; Session Closed Securely</footer>

<script>
const now = new Date();
document.getElementById('sumDate').textContent = now.toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
document.getElementById('sumTime').textContent = now.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});

const session = JSON.parse(sessionStorage.getItem('evrs_officer')||'null');
document.getElementById('sumOfficer').textContent = session?.name || 'Unknown Officer';

function toggleVoterList(btn) {
  const body = document.getElementById('voterListBody');
  if (body.classList.contains('show')) {
    body.classList.remove('show');
    btn.textContent = 'Show List';
  } else {
    body.classList.add('show');
    btn.textContent = 'Hide List';
  }
}

function getInitials(n) { return n.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase(); }

async function loadTodayStats() {
  try {
    const [vRes, bioRes] = await Promise.all([
      fetch('http://127.0.0.1:5000/api/voters'),
      fetch('http://127.0.0.1:5000/api/biometrics/pending')
    ]);
    const vData   = await vRes.json();
    const bioData = await bioRes.json();
    const voters  = vData.voters || [];
    const pendingIds = new Set((bioData.pending||[]).map(p=>p.voter_id));
    const today   = new Date().toDateString();
    const todayVoters = voters.filter(v => v.created_at && new Date(v.created_at).toDateString()===today);

    document.getElementById('todayCount').textContent = todayVoters.length;

    // Ward breakdown
    const wardMap = {};
    todayVoters.forEach(v => {
      const w = v.ward_number || 'Unknown';
      wardMap[w] = (wardMap[w]||0)+1;
    });
    const entries = Object.entries(wardMap).sort((a,b)=>b[1]-a[1]);
    const max = entries[0]?.[1]||1;
    const wardList = document.getElementById('wardList');
    wardList.innerHTML = entries.length
      ? entries.map(([w,c])=>`
        <div class="ward-row">
          <span class="ward-name">Ward ${w}</span>
          <div class="ward-bar-wrap"><div class="ward-bar" style="width:${(c/max)*100}%"></div></div>
          <span class="ward-count">${c}</span>
        </div>`).join('')
      : '<div class="no-data">No registrations today.</div>';

    // Voter list
    const voterListContent = document.getElementById('voterListContent');
    voterListContent.outerHTML = todayVoters.length
      ? todayVoters.map(v=>`
        <div class="voter-list-item">
          <div class="vli-avatar">${getInitials(v.name)}</div>
          <div style="flex:1">
            <div class="vli-name">${v.name}</div>
            <div class="vli-meta">
              <span><i class="fa-solid fa-location-dot"></i> Ward ${v.ward_number||'—'}</span>
              <span>${v.district||'—'}</span>
            </div>
          </div>
          <span class="vli-bio ${pendingIds.has(v.voter_id)?'pending':'done'}">${pendingIds.has(v.voter_id)?'Biometrics Pending':'Biometrics Done'}</span>
        </div>`).join('')
      : '<div class="no-data" id="voterListContent">No voters registered today.</div>';

  } catch {
    document.getElementById('todayCount').textContent = '—';
    document.getElementById('wardList').innerHTML = '<div class="no-data">Could not load data — server offline.</div>';
  }
}

// Clear session then load
sessionStorage.removeItem('evrs_officer');
loadTodayStats();
</script>
</body>
</html>
